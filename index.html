<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cocktail Book</title>
<meta name="theme-color" content="#1A1714">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cocktail Book">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#1A1714;--ink-mid:#3D3530;--ink-soft:#6B5E56;--ink-faint:#A89890;--paper:#FAF7F2;--paper-warm:#F2EDE4;--paper-deep:#E8E0D4;--rule:#D8CFBF;--accent:#8B3A2A;--accent-light:#C4633A;--accent-pale:#F5EAE4;--teal:#2A5C58;--teal-pale:#E4EFEE;--gold:#A07828;--gold-pale:#F5EED8;--radius:2px;--shadow:0 2px 12px rgba(26,23,20,0.08),0 1px 3px rgba(26,23,20,0.06);--shadow-lg:0 8px 40px rgba(26,23,20,0.14),0 2px 8px rgba(26,23,20,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;font-size:15px}
.site-header{background:var(--ink);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{font-family:'Libre Baskerville',serif;font-size:22px;color:var(--paper);letter-spacing:0.01em}
.logo em{font-style:italic;color:var(--accent-light)}
.header-actions{display:flex;gap:10px;align-items:center}
.sync-status{font-size:11px;font-weight:400;letter-spacing:0.06em;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px}
.sync-status.ok{color:#7BB8A0}.sync-status.loading{color:rgba(250,247,242,0.4)}.sync-status.error{color:#E8875A}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-status.ok .sync-dot{background:#7BB8A0}.sync-status.loading .sync-dot{background:rgba(250,247,242,0.3)}.sync-status.error .sync-dot{background:#E8875A}
.btn{font-family:'Jost',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:8px 18px;border:none;cursor:pointer;transition:all 0.18s;border-radius:var(--radius)}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-light)}
.btn-ghost{background:transparent;color:rgba(250,247,242,0.6);border:1px solid rgba(250,247,242,0.2)}
.btn-ghost:hover{color:var(--paper);border-color:rgba(250,247,242,0.5)}
.btn-sm{font-size:11px;padding:6px 14px}
.app{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:240px;min-width:240px;background:var(--paper-warm);border-right:1px solid var(--rule);padding:28px 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto}
.sidebar-section{margin-bottom:28px;padding:0 20px}
.sidebar-label{font-size:9px;font-weight:600;letter-spacing:0.25em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px}
.filter-btn{display:block;width:100%;text-align:left;background:none;border:none;font-family:'Jost',sans-serif;font-size:13.5px;font-weight:400;color:var(--ink-soft);padding:6px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.15s;margin-bottom:2px}
.filter-btn:hover{background:var(--paper-deep);color:var(--ink)}.filter-btn.active{background:var(--accent-pale);color:var(--accent);font-weight:500}
.filter-btn .count{float:right;font-size:11px;color:var(--ink-faint);font-weight:300}.filter-btn.active .count{color:var(--accent-light)}
.sidebar-divider{height:1px;background:var(--rule);margin:4px 20px 24px}
.main{flex:1;padding:36px 40px;max-width:100%}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;text-align:center;padding:40px}
.empty-icon{width:72px;height:72px;border:1.5px solid var(--rule);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px;color:var(--ink-faint);font-size:28px}
.empty-state h2{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:400;color:var(--ink);margin-bottom:10px}
.empty-state p{font-size:14px;font-weight:300;color:var(--ink-soft);max-width:340px;line-height:1.7;margin-bottom:28px}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--rule)}
.section-title{font-family:'Libre Baskerville',serif;font-size:24px;font-weight:400;color:var(--ink)}
.section-count{font-size:12px;font-weight:300;color:var(--ink-faint);letter-spacing:0.06em}
.search-bar{display:flex;gap:10px;margin-bottom:28px}
.search-input{flex:1;font-family:'Jost',sans-serif;font-size:14px;font-weight:300;padding:10px 16px;background:#fff;border:1px solid var(--rule);border-radius:var(--radius);color:var(--ink);outline:none;transition:border-color 0.15s}
.search-input:focus{border-color:var(--ink-soft)}.search-input::placeholder{color:var(--ink-faint)}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.recipe-card{background:#fff;border:1px solid var(--rule);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);display:flex;flex-direction:column}
.recipe-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--ink-faint)}
.card-colour-bar{height:4px;width:100%}
.card-body{padding:20px 18px;flex:1}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.card-tag{font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:3px 8px;border-radius:2px}
.tag-cuisine{background:var(--gold-pale);color:var(--gold)}.tag-type{background:var(--teal-pale);color:var(--teal)}.tag-cocktail{background:var(--accent-pale);color:var(--accent)}
.card-name{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:6px;line-height:1.3}
.card-description{font-size:12.5px;font-weight:300;color:var(--ink-soft);line-height:1.65;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:14px;font-size:11px;color:var(--ink-faint);font-weight:300;padding-top:12px;border-top:1px solid var(--paper-deep)}
.card-meta span{display:flex;align-items:center;gap:4px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,23,20,0.6);z-index:200;overflow-y:auto;padding:40px 20px}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--paper);width:100%;max-width:700px;border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp 0.22s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-header{background:var(--ink);padding:28px 32px 24px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.6);width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.modal-close:hover{background:rgba(255,255,255,0.2);color:#fff}
.modal-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.modal-tag{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:3px 10px;border-radius:2px}
.modal-tag-cuisine{background:rgba(160,120,40,0.25);color:#E8B860}.modal-tag-type{background:rgba(42,92,88,0.3);color:#7BB8D4}.modal-tag-cocktail{background:rgba(139,58,42,0.3);color:#E8874E}
.modal-name{font-family:'Libre Baskerville',serif;font-size:30px;font-weight:400;color:var(--paper);line-height:1.15;margin-bottom:8px}
.modal-desc{font-size:13.5px;font-weight:300;color:rgba(250,247,242,0.6);line-height:1.7}
.modal-meta{display:flex;gap:20px;font-size:12px;color:rgba(250,247,242,0.45);margin-top:14px;font-weight:300}
.modal-body{padding:28px 32px}
.modal-section-title{font-size:10px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--rule)}
.ingredients-list{list-style:none;margin-bottom:28px}
.ingredients-list li{font-size:14px;font-weight:300;color:var(--ink-mid);line-height:1.8;padding:5px 0;border-bottom:1px solid var(--paper-deep);display:flex;gap:10px}
.ingredients-list li::before{content:'–';color:var(--accent-light);flex-shrink:0}
.steps-list{list-style:none}
.step{display:flex;gap:16px;margin-bottom:18px}
.step-num{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;color:var(--rule);flex-shrink:0;line-height:1.4;min-width:24px}
.step-text{font-size:14px;font-weight:300;color:var(--ink-mid);line-height:1.75}
.modal-notes{background:var(--paper-warm);border-left:3px solid var(--gold);padding:14px 18px;margin-top:20px;font-size:13px;font-weight:300;color:var(--ink-soft);line-height:1.7}
.modal-actions{padding:16px 32px 24px;display:flex;gap:10px;border-top:1px solid var(--rule)}
.form-modal{max-width:640px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-group{margin-bottom:16px}.form-group.full{grid-column:span 2}
.form-label{display:block;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;font-family:'Jost',sans-serif;font-size:14px;font-weight:300;padding:10px 14px;background:#fff;border:1px solid var(--rule);border-radius:var(--radius);color:var(--ink);outline:none;transition:border-color 0.15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--ink-soft)}
.form-textarea{min-height:90px;resize:vertical;line-height:1.6}
.dynamic-list{display:flex;flex-direction:column;gap:8px}
.dynamic-item{display:flex;gap:8px;align-items:center}
.dynamic-item input{flex:1;font-family:'Jost',sans-serif;font-size:13.5px;font-weight:300;padding:8px 12px;background:#fff;border:1px solid var(--rule);border-radius:var(--radius);color:var(--ink);outline:none}
.dynamic-item input:focus{border-color:var(--ink-soft)}
.remove-btn{background:none;border:none;color:var(--ink-faint);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;transition:color 0.15s;flex-shrink:0}
.remove-btn:hover{color:var(--accent)}
.add-row-btn{background:none;border:1px dashed var(--rule);width:100%;padding:8px;font-family:'Jost',sans-serif;font-size:12px;font-weight:400;color:var(--ink-faint);cursor:pointer;border-radius:var(--radius);transition:all 0.15s;margin-top:4px}
.add-row-btn:hover{border-color:var(--ink-soft);color:var(--ink-soft)}
.loading-spinner{display:flex;align-items:center;justify-content:center;min-height:300px;font-size:13px;font-weight:300;color:var(--ink-faint);letter-spacing:0.08em}
.toast{position:fixed;bottom:28px;right:28px;background:var(--ink);color:var(--paper);padding:12px 20px;border-radius:var(--radius);font-size:13px;font-weight:400;box-shadow:var(--shadow-lg);z-index:999;transform:translateY(80px);opacity:0;transition:all 0.25s}
.toast.show{transform:translateY(0);opacity:1}
.colour-bar-recipe{background:var(--teal)}.colour-bar-cocktail{background:var(--accent)}.colour-bar-side{background:var(--gold)}
@media(max-width:700px){.sidebar{display:none}.main{padding:20px}.site-header{padding:0 16px}.logo{font-size:18px}.recipe-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.form-group.full{grid-column:span 1}.modal-body{padding:20px}.modal-header{padding:20px}.modal-actions{padding:12px 20px 20px}}
</style>
</head>
<body>
<header class="site-header">
  <div class="logo">The <em>Cocktail</em> Book</div>
  <div class="header-actions">
    <div class="sync-status loading" id="sync-status"><div class="sync-dot"></div><span id="sync-text">Connecting…</span></div>
    <button class="btn btn-ghost btn-sm" onclick="openAddModal()">+ Add</button>
  </div>
</header>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Browse</div>
      <button class="filter-btn active" onclick="setFilter('all','all')" id="filter-all">All <span class="count" id="count-all">—</span></button>
      <button class="filter-btn" onclick="setFilter('type','recipe')" id="filter-recipe">Recipes <span class="count" id="count-recipe">—</span></button>
      <button class="filter-btn" onclick="setFilter('type','cocktail')" id="filter-cocktail">Cocktails &amp; drinks <span class="count" id="count-cocktail">—</span></button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">By cuisine</div>
      <div id="cuisine-filters"><div style="font-size:12px;color:var(--ink-faint);padding:4px 10px;">Loading…</div></div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">By type</div>
      <div id="type-filters"><div style="font-size:12px;color:var(--ink-faint);padding:4px 10px;">Loading…</div></div>
    </div>
  </nav>
  <main class="main" id="main-content"><div class="loading-spinner">Loading your recipes…</div></main>
</div>
<div class="modal-overlay" id="view-modal"><div class="modal" id="view-modal-inner"></div></div>
<div class="modal-overlay" id="form-modal">
  <div class="modal form-modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeFormModal()">×</button>
      <div class="modal-name" id="form-modal-title">Add new recipe</div>
      <div class="modal-desc" style="color:rgba(250,247,242,0.5);font-size:13px;font-weight:300;">Fields marked * are required.</div>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="f-name" placeholder="e.g. Lamb chops" /></div>
        <div class="form-group"><label class="form-label">Category *</label><select class="form-select" id="f-category"><option value="recipe">Recipe</option><option value="cocktail">Cocktail / drink</option></select></div>
        <div class="form-group"><label class="form-label">Cuisine</label><input class="form-input" id="f-cuisine" placeholder="e.g. Greek, Mexican…" /></div>
        <div class="form-group"><label class="form-label">Type / dish</label><input class="form-input" id="f-type" placeholder="e.g. BBQ, Side dish…" /></div>
        <div class="form-group"><label class="form-label">Serves</label><input class="form-input" id="f-serves" placeholder="e.g. 5" type="number" min="1" /></div>
        <div class="form-group"><label class="form-label">Time</label><input class="form-input" id="f-time" placeholder="e.g. 45 min" /></div>
        <div class="form-group full"><label class="form-label">Short description *</label><input class="form-input" id="f-desc" placeholder="A brief description of the dish…" /></div>
      </div>
      <div class="form-group"><label class="form-label">Ingredients *</label><div class="dynamic-list" id="ingredients-list"></div><button class="add-row-btn" onclick="addIngredient()">+ Add ingredient</button></div>
      <div class="form-group"><label class="form-label">Method / steps *</label><div class="dynamic-list" id="steps-list"></div><button class="add-row-btn" onclick="addStep()">+ Add step</button></div>
      <div class="form-group"><label class="form-label">Notes &amp; tips (optional)</label><textarea class="form-textarea" id="f-notes" placeholder="Any tips, make-ahead advice, substitutions…"></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="save-btn" onclick="saveEntry()">Save</button>
      <button class="btn btn-sm" style="background:none;border:1px solid var(--rule);color:var(--ink-soft);" onclick="closeFormModal()">Cancel</button>
      <button class="btn btn-sm" id="delete-btn" style="margin-left:auto;background:none;border:1px solid #E8D0CC;color:#C47060;display:none;" onclick="deleteEntry()">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://olrluriioyhjoakyuqdv.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9scmx1cmlpb3loam9ha3l1cWR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTIxNTYsImV4cCI6MjA4OTYyODE1Nn0.3pZKvaA3b352HB2L4diX2FoUISGqiXzCYldVsLp6Cew';
const{createClient}=supabase;
const db=createClient(SUPABASE_URL,SUPABASE_KEY);
if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(()=>{});})}
let entries=[],editingId=null,currentFilter={key:'all',val:'all'},searchQuery='';
function setSyncStatus(s,t){const el=document.getElementById('sync-status'),tx=document.getElementById('sync-text');el.className='sync-status '+s;tx.textContent=t}
async function loadEntries(){setSyncStatus('loading','Loading…');try{const{data,error}=await db.from('recipes').select('*').order('created_at',{ascending:false});if(error)throw error;entries=(data||[]).map(r=>({...r,ingredients:parseList(r.ingredients),steps:parseList(r.steps)}));setSyncStatus('ok','Synced');renderMain()}catch(e){setSyncStatus('error','Connection error');showToast('Could not connect to database');renderMain()}}
function parseList(v){if(!v)return[];try{return JSON.parse(v)}catch{return v.split('\n').filter(Boolean)}}
function setFilter(key,val){currentFilter={key,val};searchQuery='';const s=document.getElementById('search-input');if(s)s.value='';const g=document.getElementById('recipe-grid-container');if(g)g.closest('#main-content').innerHTML='';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));if(key==='all'){document.getElementById('filter-all')?.classList.add('active')}else if(key==='type'&&(val==='recipe'||val==='cocktail')){document.getElementById('filter-'+val)?.classList.add('active')}else{document.getElementById('fb-'+btoa(unescape(encodeURIComponent(val))))?.classList.add('active')}renderMain()}
function getFiltered(){let list=entries;if(currentFilter.key==='type'&&currentFilter.val!=='all'){list=list.filter(e=>e.category===currentFilter.val)}else if(currentFilter.key==='cuisine'){list=list.filter(e=>(e.cuisine||'').toLowerCase()===currentFilter.val.toLowerCase())}else if(currentFilter.key==='dish'){list=list.filter(e=>(e.type||'').toLowerCase()===currentFilter.val.toLowerCase())}if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(e=>e.name.toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q)||(e.cuisine||'').toLowerCase().includes(q)||(e.type||'').toLowerCase().includes(q))}return list}
function renderSidebar(){document.getElementById('count-all').textContent=entries.length;document.getElementById('count-recipe').textContent=entries.filter(e=>e.category==='recipe').length;document.getElementById('count-cocktail').textContent=entries.filter(e=>e.category==='cocktail').length;const cuisines=[...new Set(entries.map(e=>e.cuisine).filter(Boolean))].sort();document.getElementById('cuisine-filters').innerHTML=cuisines.length?cuisines.map(c=>{const id='fb-'+btoa(unescape(encodeURIComponent(c)));const active=currentFilter.key==='cuisine'&&currentFilter.val.toLowerCase()===c.toLowerCase();return`<button class="filter-btn ${active?'active':''}" id="${id}" onclick="setFilter('cuisine',${JSON.stringify(c)})">${c} <span class="count">${entries.filter(e=>(e.cuisine||'').toLowerCase()===c.toLowerCase()).length}</span></button>`}).join(''):'<div style="font-size:12px;color:var(--ink-faint);padding:4px 10px;">None yet</div>';const types=[...new Set(entries.map(e=>e.type).filter(Boolean))].sort();document.getElementById('type-filters').innerHTML=types.length?types.map(t=>{const id='fb-'+btoa(unescape(encodeURIComponent(t)));const active=currentFilter.key==='dish'&&currentFilter.val.toLowerCase()===t.toLowerCase();return`<button class="filter-btn ${active?'active':''}" id="${id}" onclick="setFilter('dish',${JSON.stringify(t)})">${t} <span class="count">${entries.filter(e=>(e.type||'').toLowerCase()===t.toLowerCase()).length}</span></button>`}).join(''):'<div style="font-size:12px;color:var(--ink-faint);padding:4px 10px;">None yet</div>'}
function renderMain(){renderSidebar();const filtered=getFiltered();const main=document.getElementById('main-content');if(entries.length===0){main.innerHTML=`<div class="empty-state"><div class="empty-icon">📖</div><h2>Your recipe book is empty</h2><p>Start building your collection by adding your first recipe or cocktail. Everything syncs across all your devices automatically.</p><button class="btn btn-primary" onclick="openAddModal()">+ Add your first recipe</button></div>`;return}const title=currentFilter.key==='all'?'Everything':currentFilter.key==='type'?(currentFilter.val==='recipe'?'Recipes':'Cocktails & drinks'):currentFilter.val;if(!document.getElementById('recipe-grid-container')){main.innerHTML=`<div class="section-header"><h2 class="section-title" id="section-title">${title}</h2><span class="section-count" id="section-count">${filtered.length} ${filtered.length===1?'entry':'entries'}</span></div><div class="search-bar"><input class="search-input" id="search-input" placeholder="Search by name, cuisine, type…" oninput="onSearch(this.value)" /><button class="btn btn-primary" onclick="openAddModal()">+ Add</button></div><div id="no-results" style="display:none;color:var(--ink-faint);font-size:14px;font-weight:300;padding:40px 0;text-align:center;">No results found.</div><div class="recipe-grid" id="recipe-grid-container"></div>`}document.getElementById('section-title').textContent=title;document.getElementById('section-count').textContent=`${filtered.length} ${filtered.length===1?'entry':'entries'}`;document.getElementById('no-results').style.display=filtered.length===0?'block':'none';document.getElementById('recipe-grid-container').innerHTML=filtered.map(cardHTML).join('')}
function onSearch(val){searchQuery=val;renderSidebar();const filtered=getFiltered();document.getElementById('section-count').textContent=`${filtered.length} ${filtered.length===1?'entry':'entries'}`;document.getElementById('no-results').style.display=filtered.length===0?'block':'none';document.getElementById('recipe-grid-container').innerHTML=filtered.map(cardHTML).join('')}
function colourBar(e){if(e.category==='cocktail')return'colour-bar-cocktail';const t=(e.type||'').toLowerCase();if(t.includes('side')||t.includes('salad')||t.includes('sauce'))return'colour-bar-side';return'colour-bar-recipe'}
function cardHTML(e){return`<div class="recipe-card" onclick="openView(${JSON.stringify(e.id)})"><div class="card-colour-bar ${colourBar(e)}"></div><div class="card-body"><div class="card-tags">${e.cuisine?`<span class="card-tag tag-cuisine">${e.cuisine}</span>`:''} ${e.type?`<span class="card-tag tag-type">${e.type}</span>`:''} ${e.category==='cocktail'?'<span class="card-tag tag-cocktail">Cocktail</span>':''}</div><div class="card-name">${e.name}</div><div class="card-description">${e.description||''}</div><div class="card-meta">${e.serves?`<span>👤 ${e.serves}</span>`:''} ${e.time?`<span>⏱ ${e.time}</span>`:''}<span style="margin-left:auto">${(e.ingredients||[]).length} ingredients</span></div></div></div>`}
function openView(id){const e=entries.find(x=>x.id===id);if(!e)return;document.getElementById('view-modal-inner').innerHTML=`<div class="modal-header"><button class="modal-close" onclick="closeViewModal()">×</button><div class="modal-tags">${e.cuisine?`<span class="modal-tag modal-tag-cuisine">${e.cuisine}</span>`:''} ${e.type?`<span class="modal-tag modal-tag-type">${e.type}</span>`:''} ${e.category==='cocktail'?'<span class="modal-tag modal-tag-cocktail">Cocktail</span>':''}</div><div class="modal-name">${e.name}</div>${e.description?`<div class="modal-desc">${e.description}</div>`:''}<div class="modal-meta">${e.serves?`<span>Serves ${e.serves}</span>`:''} ${e.time?`<span>${e.time}</span>`:''}</div></div><div class="modal-body">${(e.ingredients||[]).length?`<div class="modal-section-title">Ingredients</div><ul class="ingredients-list">${e.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>`:''} ${(e.steps||[]).length?`<div class="modal-section-title">Method</div><div class="steps-list">${e.steps.map((s,i)=>`<div class="step"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`).join('')}</div>`:''} ${e.notes?`<div class="modal-notes">${e.notes}</div>`:''}</div><div class="modal-actions"><button class="btn btn-primary btn-sm" onclick="closeViewModal();openEditModal(${JSON.stringify(e.id)})">Edit</button><button class="btn btn-sm" style="background:none;border:1px solid var(--rule);color:var(--ink-soft);" onclick="closeViewModal()">Close</button></div>`;document.getElementById('view-modal').classList.add('open')}
function closeViewModal(){document.getElementById('view-modal').classList.remove('open')}
function openAddModal(){editingId=null;document.getElementById('form-modal-title').textContent='Add new recipe';['f-name','f-cuisine','f-type','f-serves','f-time','f-desc','f-notes'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-category').value='recipe';document.getElementById('delete-btn').style.display='none';document.getElementById('ingredients-list').innerHTML='';document.getElementById('steps-list').innerHTML='';addIngredient();addIngredient();addIngredient();addStep();addStep();document.getElementById('form-modal').classList.add('open')}
function openEditModal(id){const e=entries.find(x=>x.id===id);if(!e)return;editingId=id;document.getElementById('form-modal-title').textContent='Edit recipe';document.getElementById('f-name').value=e.name||'';document.getElementById('f-category').value=e.category||'recipe';document.getElementById('f-cuisine').value=e.cuisine||'';document.getElementById('f-type').value=e.type||'';document.getElementById('f-serves').value=e.serves||'';document.getElementById('f-time').value=e.time||'';document.getElementById('f-desc').value=e.description||'';document.getElementById('f-notes').value=e.notes||'';document.getElementById('delete-btn').style.display='inline-block';const il=document.getElementById('ingredients-list');il.innerHTML='';(e.ingredients?.length?e.ingredients:['']).forEach(v=>addIngredient(v));const sl=document.getElementById('steps-list');sl.innerHTML='';(e.steps?.length?e.steps:['']).forEach(v=>addStep(v));document.getElementById('form-modal').classList.add('open')}
function closeFormModal(){document.getElementById('form-modal').classList.remove('open')}
function addIngredient(val=''){const list=document.getElementById('ingredients-list');const row=document.createElement('div');row.className='dynamic-item';row.innerHTML=`<input type="text" placeholder="e.g. 50ml olive oil" value="${(val||'').replace(/"/g,'&quot;')}" /><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;list.appendChild(row)}
function addStep(val=''){const list=document.getElementById('steps-list');const num=list.children.length+1;const row=document.createElement('div');row.className='dynamic-item';row.innerHTML=`<input type="text" placeholder="Step ${num}…" value="${(val||'').replace(/"/g,'&quot;')}" /><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;list.appendChild(row)}
async function saveEntry(){const name=document.getElementById('f-name').value.trim();const desc=document.getElementById('f-desc').value.trim();if(!name){showToast('Please enter a name');return}if(!desc){showToast('Please add a short description');return}const ingredients=[...document.getElementById('ingredients-list').querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean);const steps=[...document.getElementById('steps-list').querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean);const btn=document.getElementById('save-btn');btn.textContent='Saving…';btn.disabled=true;const payload={name,category:document.getElementById('f-category').value,cuisine:document.getElementById('f-cuisine').value.trim()||null,type:document.getElementById('f-type').value.trim()||null,serves:document.getElementById('f-serves').value.trim()||null,time:document.getElementById('f-time').value.trim()||null,description:desc,ingredients:JSON.stringify(ingredients),steps:JSON.stringify(steps),notes:document.getElementById('f-notes').value.trim()||null};try{if(editingId){const{error}=await db.from('recipes').update(payload).eq('id',editingId);if(error)throw error;showToast('Recipe updated ✓')}else{const{error}=await db.from('recipes').insert(payload);if(error)throw error;showToast('Recipe saved ✓')}closeFormModal();await loadEntries()}catch(e){showToast('Save failed — check connection');console.error(e)}finally{btn.textContent='Save';btn.disabled=false}}
async function deleteEntry(){if(!editingId)return;if(!confirm('Delete this recipe? This cannot be undone.'))return;try{const{error}=await db.from('recipes').delete().eq('id',editingId);if(error)throw error;closeFormModal();showToast('Recipe deleted');await loadEntries()}catch(e){showToast('Delete failed — check connection')}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
document.getElementById('view-modal').addEventListener('click',function(e){if(e.target===this)closeViewModal()});
document.getElementById('form-modal').addEventListener('click',function(e){if(e.target===this)closeFormModal()});
loadEntries();
</script>
</body>
</html>
